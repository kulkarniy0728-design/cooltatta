<!DOCTYPE html>
<html>

<head>

<title>Open When ❤️</title>

<style>

body {
margin:0;
height:100vh;
overflow:hidden;
background:#ffd6e7;
font-family:Arial, sans-serif;
}


body::before {

content:"🌸 🌺 🌸 🌺 🌸 🌺 🌸 🌺 🌸 🌺 🌸 🌺";

position:absolute;

width:100%;
height:100%;

font-size:45px;
line-height:120px;

opacity:0.35;

z-index:-1;

}




#home {

width:100%;
height:100%;

position:relative;

}





.envelope {

position:absolute;

width:280px;
height:220px;

background:#fff0f5;

border-radius:30px;

box-shadow:0 12px 30px #ff7aa2;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

cursor:pointer;

transition:.3s;

}



.envelope:hover {

transform:scale(1.1);

}



.emoji {

font-size:100px;

}



.label {

font-size:22px;

font-weight:bold;

color:#d10045;

text-align:center;

padding:10px;

}





#sad {

top:25px;
left:25px;

}



#happy {

top:25px;
right:25px;

}



#missing {

bottom:25px;
left:25px;

}



#sleep {

bottom:25px;
right:25px;

}



#june {

top:50%;
left:50%;

transform:translate(-50%,-50%);

}







#letter {

display:none;

height:100%;
width:100%;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

padding:30px;

box-sizing:border-box;

}





.heartBox {

display:flex;

align-items:center;

gap:25px;

}



.flower {

font-size:70px;

animation:float 2s infinite;

}



.heart {

font-size:160px;

animation:pulse 1s infinite;

}




#message {

max-width:900px;

max-height:55vh;

overflow-y:auto;

font-size:22px;

line-height:1.6;

font-weight:bold;

color:#b0003a;

padding:15px;

}



.juneText {

font-size:55px !important;

}





button {

margin-top:25px;

padding:15px 40px;

border:none;

border-radius:30px;

background:#ff477e;

color:white;

font-size:22px;

cursor:pointer;

}





@keyframes pulse {

0% {
transform:scale(1);
}

50% {
transform:scale(1.25);
}

100% {
transform:scale(1);
}

}



@keyframes float {

0% {
transform:translateY(0);
}

50% {
transform:translateY(-15px);
}

100% {
transform:translateY(0);
}

}


</style>

</head>




<body>



<audio id="music" loop>

<source src="tujhmeinrab.mp3" type="audio/mp3">

</audio>






<div id="home">



<div class="envelope" onclick="openLetter('sad')" id="sad">

<div class="emoji">💌</div>

<div class="label">
Open when you're sad
</div>

</div>





<div class="envelope" onclick="openLetter('happy')" id="happy">

<div class="emoji">💌</div>

<div class="label">
Open when you're happy
</div>

</div>





<div class="envelope" onclick="openLetter('missing')" id="missing">

<div class="emoji">💌</div>

<div class="label">

</div>

</div>





<div class="envelope" onclick="openLetter('sleep')" id="sleep">

<div class="emoji">💌</div>

<div class="label">
Open when you can't sleep
</div>

</div>





<div class="envelope" onclick="openLetter('june')" id="june">

<div class="emoji">💌</div>

<div class="label">
Open June 27th ❤️
</div>

</div>




</div>










<div id="letter">


<div class="heartBox">

<div class="flower">
🌸
</div>


<div class="heart">
❤️
</div>


<div class="flower">
🌸
</div>


</div>




<div id="message"></div>




<button onclick="goHome()">
Back ❤️

</div>









<script>

function openLetter(type){


document.getElementById("music").play();


document.getElementById("home").style.display="none";


document.getElementById("letter").style.display="flex";



let box=document.getElementById("message");


if(type==="june"){

box.className="juneText";

}

else {

box.className="";

}



box.innerHTML=messages[type].replace(/\n/g,"<br>");



}





function goHome(){


document.getElementById("home").style.display="block";


document.getElementById("letter").style.display="none";


}



</script>



</body>

</html>
